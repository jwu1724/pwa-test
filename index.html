<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>我的測試 PWA</title>
        <link rel="manifest" href="manifest.json" />
        <link rel="icon" href="icon-192.png" type="image/png" />
        <meta name="theme-color" content="#4A90E2" />
        <style>
            body {
                font-family: sans-serif;
                text-align: center;
                padding: 50px;
                background: #f4f4f9;
            }
            .card {
                background: white;
                padding: 20px;
                border-radius: 15px;
                shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }
            button {
                padding: 10px 20px;
                background: #4a90e2;
                color: white;
                border: none;
                border-radius: 5px;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>你好！這是 PWA 測試</h1>
            <p id="status">正在檢查網路狀態...</p>
            <button onclick="alert('功能正常！')">點擊測試</button>
        </div>

        <script>
            // 註冊 Service Worker
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker
                        .register("sw.js")
                        .then((reg) =>
                            console.log("Service Worker 註冊成功", reg),
                        )
                        .catch((err) => console.log("註冊失敗", err));
                });
            }

            // 偵測離線狀態
            function updateStatus() {
                document.getElementById("status").innerText = navigator.onLine
                    ? "🌐 目前在線"
                    : "🚫 離線模式 (PWA 仍可運作)";
            }
            window.addEventListener("online", updateStatus);
            window.addEventListener("offline", updateStatus);
            updateStatus();
        </script>
    </body>
</html>
